<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Variety — THT Orchid Farm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ── Navigation ── -->
<nav id="nav" class="scrolled">
  <a href="index.html" class="nav-logo">THT Orchid Farm</a>

  <ul class="nav-links">
    <li><a href="varieties.html">Varieties</a></li>
    <li><a href="index.html#about">Our Farm</a></li>
    <li><a href="index.html#care">Care Guide</a></li>
    <li><a href="index.html#contact">Contact</a></li>
    <li><a href="index.html#contact" class="nav-cta">Order Now</a></li>
  </ul>

  <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<!-- ── Mobile full-screen menu ── -->
<div class="mobile-menu" id="mobileMenu" aria-hidden="true">
  <a href="varieties.html" class="mobile-link">Varieties</a>
  <div class="mobile-divider"></div>
  <a href="index.html#about" class="mobile-link">Our Farm</a>
  <div class="mobile-divider"></div>
  <a href="index.html#care" class="mobile-link">Care Guide</a>
  <div class="mobile-divider"></div>
  <a href="index.html#contact" class="mobile-link">Contact</a>
  <a href="index.html#contact" class="mobile-link mobile-cta">Order Now</a>
</div>

<!-- ── Detail hero (populated by JS) ── -->
<div class="detail-hero" id="detailHero">
  <div class="detail-swatch" id="detailSwatch">
    <div class="card-image-fill" id="detailFill"></div>
    <span class="card-badge" id="detailBadge"></span>
  </div>
  <div class="detail-info">
    <a href="varieties.html" class="detail-back">← All varieties</a>
    <p class="detail-species" id="detailSpecies"></p>
    <h1 class="detail-name" id="detailName"></h1>
    <p class="detail-desc" id="detailDesc"></p>
    <div class="detail-specs" id="detailSpecs"></div>
    <div class="detail-actions">
      <a href="index.html#contact" class="btn-primary">Enquire about this variety</a>
    </div>
  </div>
</div>

<!-- ── Related varieties ── -->
<section class="detail-related">
  <h2 class="section-title">You might also <em>like</em></h2>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<!-- ── Footer ── -->
<footer>
  <div class="footer-logo">THT Orchid Farm</div>
  <p class="footer-copy">© 2026 THT Orchid Farm. All rights reserved.</p>
  <div class="footer-links">
    <a href="varieties.html">Varieties</a>
    <a href="index.html#about">About</a>
    <a href="index.html#care">Care</a>
    <a href="index.html#contact">Contact</a>
  </div>
</footer>

<script src="main.js"></script>
<script>
  const id = new URLSearchParams(window.location.search).get('id');

  function swatchHTML(v) {
    return v.image
      ? `<img src="${v.image}" alt="${v.name}" style="width:100%;height:100%;object-fit:cover;display:block">`
      : `<div class="card-image-fill ${v.fill}"></div>`;
  }

  fetch('varieties.json')
    .then(r => r.json())
    .then(varieties => {
      const variety = varieties.find(v => v.id === id);

      if (!variety) {
        document.title = 'Not found — THT Orchid Farm';
        document.getElementById('detailHero').innerHTML =
          '<div style="padding:10rem 3rem;text-align:center;grid-column:1/-1">' +
          '<p style="font-size:1rem;color:#9b5e6a;margin-bottom:1rem">Variety not found</p>' +
          '<a href="varieties.html" style="font-size:0.85rem;color:#2d2418">← Back to all varieties</a>' +
          '</div>';
        document.querySelector('.detail-related').style.display = 'none';
        return;
      }

      document.title = variety.name + ' — THT Orchid Farm';

      document.getElementById('detailFill').replaceWith(
        Object.assign(document.createElement('div'), { innerHTML: swatchHTML(variety) }).firstChild
      );
      document.getElementById('detailSpecies').textContent = variety.species;
      document.getElementById('detailName').textContent = variety.name;
      document.getElementById('detailDesc').textContent = variety.longDesc;

      const badge = document.getElementById('detailBadge');
      if (variety.badge) { badge.textContent = variety.badge; } else { badge.remove(); }

      document.getElementById('detailSpecs').innerHTML = [
        { label: 'Pot size',    value: variety.pot },
        { label: 'Bloom time',  value: variety.bloom },
        { label: 'Light',       value: variety.light },
        { label: 'Care level',  value: variety.care },
        { label: 'Watering',    value: variety.watering },
        { label: 'Temperature', value: variety.temperature },
      ].map(s => `<div class="spec"><span class="spec-label">${s.label}</span><span class="spec-value">${s.value}</span></div>`)
       .join('');

      document.getElementById('relatedGrid').innerHTML = varieties
        .filter(v => v.id !== id)
        .slice(0, 3)
        .map(v => `
          <a href="variety.html?id=${v.id}" class="related-card">
            <div class="related-swatch">${swatchHTML(v)}</div>
            <div class="related-body">
              <div class="related-name">${v.name}</div>
              <div class="related-species">${v.species}</div>
            </div>
          </a>`)
        .join('');
    });
</script>
</body>
</html>
